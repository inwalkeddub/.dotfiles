# Unbind the default prefix
unbind C-b

# Set new prefix to Ctrl-a
set-option -g prefix C-a

# Allow sending Ctrl-a to other apps by pressing it twice
# bind-key C-a send-prefix

# repeat C-a for last window
bind-key -r C-a last-window

# C-o o to send C-o to claude
bind o send-keys C-o

# Make the current session name easy to spot
# Big, colored session name on the left of the status bar
set -g status-left "#[bg=colour33,fg=white,bold] #S #[default] "
set -g status-left-length 30

# Also show the session name in the terminal window/tab title
set -g set-titles on
set -g set-titles-string "tmux: #S"

# Make the current window in the tab list stand out
setw -g window-status-current-style 'bg=colour33,fg=white,bold'

# Keep manual window names from being overwritten by the running command
set -g allow-rename off
set -g automatic-rename off

# Prev / next session — vim-style, no shift
bind k switch-client -p
bind j switch-client -n

# Last (most recently used) session — l for "last", sits next to j/k
# (default last-window on l is unused here; C-a C-a covers that)
bind l switch-client -l

# Vim-style keys in copy mode (v to select, y to yank, hjkl to move)
setw -g mode-keys vi
# tmux's vi mode defaults to Space/Enter; rebind to real vim v/y
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
